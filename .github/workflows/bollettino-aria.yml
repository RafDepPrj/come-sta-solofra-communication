name: Bollettino aria Solofra

on:
  schedule:
    # Controlla ogni 2 ore durante il giorno (7-22 circa ora italiana).
    # NON pubblica quasi mai: lo script decide da solo se c'è qualcosa da
    # dire (cambio di fascia) o se sono passati troppi giorni in silenzio.
    # La maggior parte di questi run non manda alcun messaggio: costano
    # pochi secondi e zero rumore per chi segue il canale.
    - cron: '0 5,7,9,11,13,15,17,19,21 * * *'
  workflow_dispatch:   # per lanciarlo a mano dal tab "Actions"

permissions:
  contents: write

jobs:
  bollettino:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v5

      - name: Installa Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install requests pillow

      - name: Controlla e pubblica solo se necessario
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bollettino.py

      - name: Salva lo stato e lo storico per la prossima esecuzione
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stato.json storico.json
          git diff --staged --quiet || git commit -m "Aggiorna stato e storico aria [skip ci]"
          git push
